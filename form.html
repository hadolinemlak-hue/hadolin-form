<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HADOLİN CRM</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .wrap{
            max-width:600px;
            margin:40px auto;
            padding:20px;
        }

        .card{
            background:#111827;
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        h2{
            margin-top:0;
            margin-bottom:20px;
            text-align:center;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:none;
            border-radius:8px;
            background:#1f2937;
            color:white;
            box-sizing:border-box;
        }

        input::placeholder{
            color:#9ca3af;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .link{
            display:block;
            text-align:center;
            margin-top:18px;
            color:#22c55e;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h2>
                {% if edit_index is not none %}
                    HADOLİN CRM – Müşteri Düzenle
                {% else %}
                    HADOLİN CRM – Yeni Müşteri
                {% endif %}
            </h2>

            <form action="{% if edit_index is not none %}/guncelle/{{ edit_index }}{% else %}/kaydet{% endif %}" method="post">

                <label for="ad">Ad Soyad</label>
                <input type="text" id="ad" name="ad" placeholder="Müşteri adı soyadı"
                       value="{{ musteri['Ad Soyad'] if musteri else '' }}" required>

                <label for="telefon">Telefon</label>
                <input type="text" id="telefon" name="telefon" placeholder="05XXXXXXXXX"
                       value="{{ musteri['Telefon'] if musteri else '' }}" required>

                <label for="talep">Talep</label>
                <input type="text" id="talep" name="talep" placeholder="2+1 daire, yatırım, villa..."
                       value="{{ musteri['Talep'] if musteri else '' }}" required>

                <label for="butce">Bütçe</label>
                <input type="text" id="butce" name="butce" placeholder="Örn: 3.500.000 TL"
                       value="{{ musteri['Bütçe'] if musteri else '' }}">

                <label for="mevkii">Mevkii</label>
                <input type="text" id="mevkii" name="mevkii" placeholder="Başakşehir, Çerkezköy..."
                       value="{{ musteri['Mevkii'] if musteri else '' }}">

                <label for="tip">Müşteri Tipi</label>
                <select id="tip" name="tip">
                    <option value="Satılık" {% if musteri and musteri["Tip"] == "Satılık" %}selected{% endif %}>Satılık</option>
                    <option value="Kiralık" {% if musteri and musteri["Tip"] == "Kiralık" %}selected{% endif %}>Kiralık</option>
                </select>

                <label for="kategori">Kategori</label>
                <select id="kategori" name="kategori">
                    <option value="Daire" {% if musteri and musteri["Kategori"] == "Daire" %}selected{% endif %}>Daire</option>
                    <option value="Arsa" {% if musteri and musteri["Kategori"] == "Arsa" %}selected{% endif %}>Arsa</option>
                    <option value="Fabrika" {% if musteri and musteri["Kategori"] == "Fabrika" %}selected{% endif %}>Fabrika</option>
                    <option value="İşyeri" {% if musteri and musteri["Kategori"] == "İşyeri" %}selected{% endif %}>İşyeri</option>
                </select>

                <label for="durum">Müşteri Durumu</label>
                <select id="durum" name="durum">
                    <option value="🔥 Sıcak" {% if musteri and musteri["Durum"] == "🔥 Sıcak" %}selected{% endif %}>🔥 Sıcak</option>
                    <option value="🟡 İlgileniyor" {% if musteri and musteri["Durum"] == "🟡 İlgileniyor" %}selected{% endif %}>🟡 İlgileniyor</option>
                    <option value="❄️ Sadece bakıyor" {% if musteri and musteri["Durum"] == "❄️ Sadece bakıyor" %}selected{% endif %}>❄️ Sadece bakıyor</option>
                </select>

                <button type="submit">
                    {% if edit_index is not none %}
                        Güncelle
                    {% else %}
                        Kaydet
                    {% endif %}
                </button>
            </form>

            <a class="link" href="/musteriler">Müşteri Listesini Aç</a>
        </div>
    </div>
</body>
</html>
